<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KDN MAP 로그인</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(circle at 18% 10%, rgba(255, 246, 122, 0.78), transparent 24%),
        radial-gradient(circle at 84% 14%, rgba(255, 226, 64, 0.56), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(255, 255, 255, 0.72), transparent 34%),
        linear-gradient(180deg, #fee500 0%, #ffe44d 48%, #fff8d7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px 16px;
      color: #111827;
    }
    .phone-wrap {
      width: min(390px, 100%);
      min-height: min(760px, calc(100vh - 44px));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(255,255,255,0.76);
      border-radius: 32px;
      padding: 28px 22px 22px;
      box-shadow: 0 26px 70px rgba(70, 53, 0, 0.22);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: -96px;
      right: -98px;
      width: 210px;
      height: 210px;
      border-radius: 999px;
      background: rgba(254, 229, 0, 0.34);
      filter: blur(1px);
    }
    .card::after {
      content: "";
      position: absolute;
      left: -70px;
      bottom: -80px;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      background: rgba(255, 242, 128, 0.42);
    }
    .brand {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding-top: 6px;
      margin-bottom: 30px;
      z-index: 1;
    }
    .logo-halo {
      width: 246px;
      max-width: 86%;
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.18));
      border: 1px solid rgba(255,255,255,0.34);
      box-shadow:
        0 14px 34px rgba(105, 83, 0, 0.10),
        inset 0 1px 0 rgba(255,255,255,0.58);
    }
    .logo {
      max-width: 100%;
      max-height: 62px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,0.08));
    }
    .app-title { text-align: center; }
    .app-title h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.04em;
      line-height: 1.15;
      color: #191919;
    }
    .app-title p {
      margin: 7px 0 0;
      color: #6b5b00;
      font-size: 13px;
      font-weight: 800;
    }
    .form { position: relative; z-index: 1; }
    .field { margin-bottom: 12px; position: relative; }
    .field label {
      display: block;
      margin: 0 0 7px 2px;
      font-size: 12px;
      font-weight: 800;
      color: #3f3f46;
    }
    .input {
      width: 100%;
      height: 54px;
      border: 1px solid #ebe3b8;
      border-radius: 17px;
      background: rgba(255,253,244,0.96);
      padding: 0 16px;
      font-size: 16px;
      outline: none;
      color: #191919;
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }
    .input::placeholder { color: #a1a1aa; }
    .input:focus {
      border-color: #facc15;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(250,204,21,0.20);
    }
    .login-btn {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 18px;
      background: #191919;
      color: #fee500;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 14px 26px rgba(25,25,25,0.24);
      transition: transform .12s ease, opacity .12s ease, box-shadow .12s ease;
    }
    .login-btn:active { transform: scale(0.985); box-shadow: 0 8px 18px rgba(25,25,25,0.20); }
    .login-btn:disabled { opacity: .62; cursor: not-allowed; transform: none; }
    .error {
      display: none;
      margin-top: 12px;
      padding: 11px 12px;
      border-radius: 14px;
      background: #fff1f2;
      color: #be123c;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
      text-align: center;
    }
    .footer {
      position: relative;
      z-index: 1;
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #867300;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .02em;
    }
    .dot {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: #191919;
      opacity: .32;
    }
    @media (max-width: 420px) {
      body { align-items: stretch; }
      .phone-wrap { min-height: calc(100vh - 44px); }
      .card { border-radius: 28px; padding: 25px 18px 20px; }
      .app-title h1 { font-size: 26px; }
      .logo-halo { width: 232px; max-width: 88%; }
    }
  </style>
</head>
<body>
  <div class="phone-wrap">
    <main class="card" aria-label="KDN MAP 로그인">
      <section class="brand">
        <div class="logo-halo">
          <img class="logo" src="kdn-logo-blend.png" alt="한전KDN 로고" />
        </div>
        <div class="app-title">
          <h1>KDN MAP</h1>
          <p>현장 작업 관리 시스템</p>
        </div>
      </section>

      <section class="form">
        <div class="field">
          <label for="loginId">아이디</label>
          <input id="loginId" class="input" type="text" placeholder="아이디 입력" autocomplete="username" />
        </div>

        <div class="field">
          <label for="password">비밀번호</label>
          <input id="password" class="input" type="password" placeholder="비밀번호 입력" autocomplete="current-password" />
        </div>

        <button id="loginBtn" class="login-btn" type="button">로그인</button>
        <div id="error" class="error"></div>
      </section>

      <div class="footer">
        <span>KEPCO KDN</span><span class="dot"></span><span>MAP SERVICE</span>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDfpnGLUxcqY69szJCmbWE10s2Mv9xF7Cw",
      authDomain: "kdn-map.firebaseapp.com",
      projectId: "kdn-map",
      storageBucket: "kdn-map.firebasestorage.app",
      messagingSenderId: "774166998071",
      appId: "1:774166998071:web:d99011e3487d86849e23b2",
      measurementId: "G-DE4C2P3GKZ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const next = params.get("next") || "index.html";

    const loginIdEl = document.getElementById("loginId");
    const passwordEl = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const errorEl = document.getElementById("error");

    function showError(message) {
      errorEl.textContent = message;
      errorEl.style.display = "block";
    }

    function normalizeLoginId(value) {
      const id = String(value || "").trim();
      return id.includes("@") ? id : `${id}@kdn.local`;
    }

    async function doLogin() {
      const loginId = loginIdEl.value.trim();
      const password = passwordEl.value;
      errorEl.style.display = "none";

      if (!loginId || !password) {
        showError("아이디와 비밀번호를 입력하세요.");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "로그인 중...";

      try {
        await signInWithEmailAndPassword(auth, normalizeLoginId(loginId), password);
        window.location.href = next;
      } catch (e) {
        showError("로그인 실패: 아이디 또는 비밀번호를 확인하세요.");
        loginBtn.disabled = false;
        loginBtn.textContent = "로그인";
      }
    }

    loginBtn.addEventListener("click", doLogin);
    passwordEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });
    loginIdEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") passwordEl.focus();
    });

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.replace(next);
    });
  </script>
</body>
</html>
