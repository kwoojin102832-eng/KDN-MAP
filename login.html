<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KDN MAP 로그인</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width:100%; height:100%; margin:0; padding:0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #111827, #374151);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .card {
      width:min(420px, 100%);
      background:#fff;
      border-radius:20px;
      padding:24px 20px 20px;
      box-shadow:0 20px 60px rgba(0,0,0,0.32);
    }
    .title { font-size:22px; font-weight:800; margin-bottom:6px; color:#111827; }
    .desc { font-size:13px; color:#4b5563; line-height:1.5; margin-bottom:18px; }
    label { display:block; font-size:12px; font-weight:700; color:#374151; margin:10px 0 6px; }
    input {
      width:100%; height:44px; border:1px solid #d1d5db; border-radius:12px;
      padding:0 12px; font-size:15px; outline:none;
    }
    input:focus { border-color:#111827; }
    button {
      width:100%; height:44px; border:none; border-radius:12px; background:#111827;
      color:#fff; font-size:15px; font-weight:800; margin-top:16px; cursor:pointer;
    }
    button:disabled { background:#9ca3af; cursor:not-allowed; }
    .error { display:none; margin-top:12px; color:#dc2626; font-size:12px; line-height:1.5; }
    .hint { margin-top:14px; color:#6b7280; font-size:11px; line-height:1.5; }
  </style>
</head>
<body>
  <main class="card">
    <div class="title">KDN MAP 로그인</div>
    <div class="desc">작업자 아이디와 비밀번호를 입력하면 지도로 이동합니다.</div>

    <label for="loginId">아이디</label>
    <input id="loginId" type="text" placeholder="예: kdn01 또는 김우진" autocomplete="username" />

    <label for="password">비밀번호</label>
    <input id="password" type="password" placeholder="비밀번호" autocomplete="current-password" />

    <button id="loginBtn" type="button">로그인</button>
    <div id="error" class="error"></div>
    <div class="hint">아이디만 입력하면 내부에서 자동으로 @kdn.local을 붙여 로그인합니다.</div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDfpnGLUxcqY69szJCmbWE10s2Mv9xF7Cw",
      authDomain: "kdn-map.firebaseapp.com",
      projectId: "kdn-map",
      storageBucket: "kdn-map.firebasestorage.app",
      messagingSenderId: "774166998071",
      appId: "1:774166998071:web:d99011e3487d86849e23b2",
      measurementId: "G-DE4C2P3GKZ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const next = params.get("next") || "index.html";

    const loginIdEl = document.getElementById("loginId");
    const passwordEl = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const errorEl = document.getElementById("error");

    function showError(message) {
      errorEl.textContent = message;
      errorEl.style.display = "block";
    }

    function normalizeLoginId(value) {
      const id = String(value || "").trim();
      return id.includes("@") ? id : `${id}@kdn.local`;
    }

    async function doLogin() {
      const loginId = loginIdEl.value.trim();
      const password = passwordEl.value;
      errorEl.style.display = "none";

      if (!loginId || !password) {
        showError("아이디와 비밀번호를 입력하세요.");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "로그인 중...";

      try {
        await signInWithEmailAndPassword(auth, normalizeLoginId(loginId), password);
        window.location.href = next;
      } catch (e) {
        showError("로그인 실패: 아이디/비밀번호를 확인하세요.");
        loginBtn.disabled = false;
        loginBtn.textContent = "로그인";
      }
    }

    loginBtn.addEventListener("click", doLogin);
    passwordEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });
    loginIdEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") passwordEl.focus();
    });

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.replace(next);
    });
  </script>
</body>
</html>
